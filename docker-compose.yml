services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: amahot
      POSTGRES_USER: amahot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amahot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/albal/amahot-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://amahot:${POSTGRES_PASSWORD}@postgres:5432/amahot?sslmode=disable
      PORT: "8080"
      SCRAPE_INTERVAL_MINUTES: "30"
    ports:
      - "8080:8080"

  frontend:
    image: ghcr.io/albal/amahot-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  pgdata:
